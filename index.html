<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker — Harshal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f0f3;
    --muted: #8b8b99;
    --accent: #7c6af7;
    --accent-dim: rgba(124,106,247,0.12);
    --accent-glow: rgba(124,106,247,0.25);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.12);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.12);
    --red: #f06060;
    --red-dim: rgba(240,96,96,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --purple-dim: rgba(167,139,250,0.12);
    --cyan: #06b6d4;
    --cyan-dim: rgba(6,182,212,0.12);
    --radius: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ─────────────────── */
  header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .logo-sub  { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ── Buttons ─────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); border-color: var(--border2); }
  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .btn-accent:hover { opacity: 0.9; background: var(--accent); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-icon { padding: 6px 8px; }

  /* ── Main layout ─────────────── */
  main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }

  /* ── Stats row ───────────────── */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    transition: border-color 0.15s;
  }
  .stat:hover { border-color: var(--border2); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-val   { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
  .stat-val.c-total   { color: var(--text); }
  .stat-val.c-applied { color: var(--blue); }
  .stat-val.c-screen  { color: var(--amber); }
  .stat-val.c-int     { color: var(--accent); }
  .stat-val.c-offer   { color: var(--green); }
  .stat-val.c-rej     { color: var(--red); }
  .stat-val.c-contacted { color: var(--cyan); }

  /* ── Toolbar ─────────────────── */
  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  .search-wrap input {
    width: 100%;
    padding: 8px 12px 8px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
  }
  .search-wrap input:focus { outline: none; border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  select {
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }
  select:focus { outline: none; border-color: var(--accent); }
  select option { background: var(--surface); }

  /* ── Table ───────────────────── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .table-scroll { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 860px;
  }

  thead { background: var(--surface2); }
  th {
    text-align: left;
    padding: 11px 14px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .company-name { font-weight: 500; font-size: 14px; }
  .company-source { font-size: 11px; color: var(--muted); margin-top: 1px; font-family: 'DM Mono', monospace; }

  .role-text { color: var(--text); }

  /* ── Badges ──────────────────── */
  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.02em;
    border: 1px solid transparent;
  }
  .b-Applied    { background: var(--blue-dim);   color: var(--blue);   border-color: rgba(96,165,250,0.2); }
  .b-Screening  { background: var(--amber-dim);  color: var(--amber);  border-color: rgba(245,166,35,0.2); }
  .b-Interview  { background: var(--purple-dim); color: #c4b5fd;       border-color: rgba(196,181,253,0.2); }
  .b-Offer      { background: var(--green-dim);  color: var(--green);  border-color: rgba(62,207,142,0.2); }
  .b-Rejected   { background: var(--red-dim);    color: var(--red);    border-color: rgba(240,96,96,0.2); }
  .b-Contacted  { background: var(--cyan-dim);   color: var(--cyan);   border-color: rgba(6,182,212,0.2); }

  /* ── Recruiter cell ──────────── */
  .rec-name    { font-size: 13px; }
  .rec-contact { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* ── Date / Notes cells ──────── */
  .date-text { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  .date-text.upcoming { color: var(--amber); }

  .notes-text {
    font-size: 12px;
    color: var(--muted);
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Row actions ─────────────── */
  .row-actions { display: flex; gap: 4px; }
  .ico-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 7px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 6px;
    font-size: 13px;
    transition: all 0.12s;
  }
  .ico-btn:hover { color: var(--text); background: var(--surface2); border-color: var(--border); }

  /* ── Empty state ─────────────── */
  .empty {
    padding: 4rem 2rem;
    text-align: center;
    color: var(--muted);
  }
  .empty-icon { font-size: 2rem; margin-bottom: 0.75rem; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 0.4rem; }
  .empty-sub { font-size: 13px; }

  /* ── Modal ───────────────────── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 1.5rem;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-close {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 18px; padding: 2px 6px;
    border-radius: 6px;
    transition: color 0.12s;
  }
  .modal-close:hover { color: var(--text); }

  /* ── Form ────────────────────── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { margin-bottom: 12px; }
  .form-group.span2 { grid-column: span 2; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 5px;
  }

  .form-control {
    width: 100%;
    padding: 8px 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    transition: border-color 0.12s;
  }
  .form-control:focus { outline: none; border-color: var(--accent); }
  .form-control::placeholder { color: var(--muted); }
  textarea.form-control { resize: vertical; min-height: 64px; }

  .modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }

  /* ── Toast ───────────────────── */
  .toast {
    position: fixed;
    bottom: 1.5rem; right: 1.5rem;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.25s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── Responsive ──────────────── */
  @media (max-width: 600px) {
    main { padding: 1rem; }
    header { padding: 1rem; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.span2 { grid-column: span 1; }
  }

  /* ── Scrollbar ───────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">💼</div>
    <div>
      <div class="logo-text">Job Tracker</div>
      <div class="logo-sub">harshalkumar-ishi</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn btn-accent" onclick="openModal()">+ Add Application</button>
  </div>
</header>

<main>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search company, role, recruiter…" oninput="render()">
    </div>
    <select id="filterStatus" onchange="render()">
      <option value="">All statuses</option>
      <option>Applied</option>
      <option>Contacted (Email or WhatsApp)</option>
      <option>Screening</option>
      <option>Interview</option>
      <option>Offer</option>
      <option>Rejected</option>
    </select>
    <select id="filterSource" onchange="render()">
      <option value="">All sources</option>
      <option>LinkedIn</option>
      <option>Naukri</option>
      <option>Indeed</option>
      <option>Referral</option>
      <option>Company website</option>
      <option>Other</option>
    </select>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Company</th>
            <th>Role</th>
            <th>Status</th>
            <th>Date</th>
            <th>Interview date</th>
            <th>Recruiter</th>
            <th>Follow-up</th>
            <th>Notes</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="emptyState" style="display:none">
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div class="empty-title">No applications yet</div>
        <div class="empty-sub">Hit "+ Add Application" to log your first one.</div>
      </div>
    </div>
  </div>

</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Application</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Company *</label>
        <input class="form-control" id="fCompany" placeholder="e.g. NCDEX">
      </div>
      <div class="form-group">
        <label class="form-label">Role *</label>
        <input class="form-control" id="fRole" placeholder="e.g. Python Developer">
      </div>

      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-control" id="fStatus" onchange="updateFormFields()">
          <option>Applied</option>
          <option>Contacted (Email or WhatsApp)</option>
          <option>Screening</option>
          <option>Interview</option>
          <option>Offer</option>
          <option>Rejected</option>
        </select>
      </div>
      <div class="form-group" id="appliedGroup">
        <label class="form-label">Applied on</label>
        <input class="form-control" type="date" id="fApplied">
      </div>
      <div class="form-group" id="contactedGroup" style="display: none;">
        <label class="form-label">Contacted on</label>
        <input class="form-control" type="date" id="fContacted">
      </div>

      <div class="form-group">
        <label class="form-label">Recruiter name</label>
        <input class="form-control" id="fRecruiter" placeholder="Full name">
      </div>
      <div class="form-group">
        <label class="form-label">Recruiter contact</label>
        <input class="form-control" id="fRecContact" placeholder="Phone or email">
      </div>

      <div class="form-group">
        <label class="form-label">Recruiter called on</label>
        <input class="form-control" type="date" id="fCalledOn">
      </div>
      <div class="form-group">
        <label class="form-label">Interview date & time</label>
        <input class="form-control" type="datetime-local" id="fIntDate">
      </div>

      <div class="form-group span2">
        <label class="form-label">Job source</label>
        <select class="form-control" id="fSource">
          <option value="">Select source…</option>
          <option>LinkedIn</option>
          <option>Naukri</option>
          <option>Indeed</option>
          <option>Referral</option>
          <option>Company website</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group span2">
        <label class="form-label">Follow-up taken</label>
        <textarea class="form-control" id="fFollowup" placeholder="e.g. Sent reminder email on Apr 5, waiting for reply…"></textarea>
      </div>

      <div class="form-group span2">
        <label class="form-label">Notes</label>
        <textarea class="form-control" id="fNotes" placeholder="JD highlights, salary range, tech stack asked, HR name…"></textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── Data ──────────────────────────────────────────────────
  let apps = JSON.parse(localStorage.getItem('jt_v2') || '[]');
  let editId = null;

  function persist() { localStorage.setItem('jt_v2', JSON.stringify(apps)); }

  // ── Formatting ────────────────────────────────────────────
  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    if (isNaN(dt)) return '—';
    return dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function fmtDateTime(d) {
    if (!d) return '—';
    const dt = new Date(d);
    if (isNaN(dt)) return '—';
    const date = dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
    const time = dt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
    return `${date}, ${time}`;
  }

  function isUpcoming(d) {
    if (!d) return false;
    const dt = new Date(d);
    const now = new Date();
    return dt > now && (dt - now) < 7 * 24 * 60 * 60 * 1000;
  }

  // ── Render ────────────────────────────────────────────────
  function render() {
    const q = (document.getElementById('search').value || '').toLowerCase();
    const sf = document.getElementById('filterStatus').value;
    const src = document.getElementById('filterSource').value;

    let list = apps.filter(a => {
      if (sf  && a.status !== sf)  return false;
      if (src && a.source !== src) return false;
      if (q && !(
        a.company.toLowerCase().includes(q) ||
        a.role.toLowerCase().includes(q) ||
        (a.recruiter || '').toLowerCase().includes(q)
      )) return false;
      return true;
    });

    // Stats
    const counts = { Applied: 0, 'Contacted (Email or WhatsApp)': 0, Screening: 0, Interview: 0, Offer: 0, Rejected: 0 };
    apps.forEach(a => counts[a.status] = (counts[a.status] || 0) + 1);
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="stat-label">Total</div><div class="stat-val c-total">${apps.length}</div></div>
      <div class="stat"><div class="stat-label">Applied</div><div class="stat-val c-applied">${counts.Applied || 0}</div></div>
      <div class="stat"><div class="stat-label">Contacted</div><div class="stat-val c-contacted">${counts['Contacted (Email or WhatsApp)'] || 0}</div></div>
      <div class="stat"><div class="stat-label">Screening</div><div class="stat-val c-screen">${counts.Screening || 0}</div></div>
      <div class="stat"><div class="stat-label">Interviews</div><div class="stat-val c-int">${counts.Interview || 0}</div></div>
      <div class="stat"><div class="stat-label">Offers</div><div class="stat-val c-offer">${counts.Offer || 0}</div></div>
      <div class="stat"><div class="stat-label">Rejected</div><div class="stat-val c-rej">${counts.Rejected || 0}</div></div>
    `;

    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('emptyState');

    if (!list.length) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    tbody.innerHTML = list.map(a => `
      <tr>
        <td>
          <div class="company-name">${esc(a.company)}</div>
          ${a.source ? `<div class="company-source">${esc(a.source)}</div>` : ''}
        </td>
        <td class="role-text">${esc(a.role)}</td>
        <td><span class="badge ${getBadgeClass(a.status)}">${a.status}</span></td>
        <td><span class="date-text">${fmtDate(a.status === 'Contacted (Email or WhatsApp)' ? a.contactedOn : a.applied)}</span></td>
        <td><span class="date-text ${isUpcoming(a.intDate) ? 'upcoming' : ''}">${fmtDateTime(a.intDate)}</span></td>
        <td>
          ${a.recruiter ? `<div class="rec-name">${esc(a.recruiter)}</div>` : '<span style="color:var(--muted)">—</span>'}
          ${a.recContact ? `<div class="rec-contact">${esc(a.recContact)}</div>` : ''}
          ${a.calledOn ? `<div class="rec-contact">Called: ${fmtDate(a.calledOn)}</div>` : ''}
        </td>
        <td><div class="notes-text" title="${esc(a.followup || '')}">${esc(a.followup) || '<span style="color:var(--muted)">—</span>'}</div></td>
        <td><div class="notes-text" title="${esc(a.notes || '')}">${esc(a.notes) || '<span style="color:var(--muted)">—</span>'}</div></td>
        <td>
          <div class="row-actions">
            <button class="ico-btn" title="Edit" onclick="editEntry('${a.id}')">✏️</button>
            <button class="ico-btn" title="Delete" onclick="deleteEntry('${a.id}')">🗑️</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function updateFormFields() {
    const status = document.getElementById('fStatus').value;
    const appliedGroup = document.getElementById('appliedGroup');
    const contactedGroup = document.getElementById('contactedGroup');
    
    if (status === 'Contacted (Email or WhatsApp)') {
      appliedGroup.style.display = 'none';
      contactedGroup.style.display = 'block';
    } else {
      appliedGroup.style.display = 'block';
      contactedGroup.style.display = 'none';
    }
  }

  // ── Modal ─────────────────────────────────────────────────
  function openModal(id) {
    editId = id || null;
    document.getElementById('modalTitle').textContent = id ? 'Edit Application' : 'Add Application';
    if (id) {
      const a = apps.find(x => x.id === id);
      document.getElementById('fCompany').value   = a.company    || '';
      document.getElementById('fRole').value      = a.role       || '';
      document.getElementById('fStatus').value    = a.status     || 'Applied';
      document.getElementById('fApplied').value   = a.applied    || '';
      document.getElementById('fContacted').value = a.contactedOn || '';
      document.getElementById('fRecruiter').value = a.recruiter  || '';
      document.getElementById('fRecContact').value= a.recContact || '';
      document.getElementById('fCalledOn').value  = a.calledOn   || '';
      document.getElementById('fIntDate').value   = a.intDate    || '';
      document.getElementById('fSource').value    = a.source     || '';
      document.getElementById('fFollowup').value  = a.followup   || '';
      document.getElementById('fNotes').value     = a.notes      || '';
    } else {
      ['fCompany','fRole','fRecruiter','fRecContact','fFollowup','fNotes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('fStatus').value  = 'Applied';
      document.getElementById('fApplied').value = new Date().toISOString().split('T')[0];
      document.getElementById('fContacted').value = '';
      document.getElementById('fCalledOn').value = '';
      document.getElementById('fIntDate').value  = '';
      document.getElementById('fSource').value   = '';
    }
    updateFormFields();
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editId = null;
  }

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  // ── Save ──────────────────────────────────────────────────
  function saveEntry() {
    const company = document.getElementById('fCompany').value.trim();
    const role    = document.getElementById('fRole').value.trim();
    if (!company || !role) { showToast('Company and role are required.'); return; }

    const entry = {
      id:         editId || Date.now().toString(),
      company,    role,
      status:     document.getElementById('fStatus').value,
      applied:    document.getElementById('fApplied').value,
      contactedOn: document.getElementById('fContacted').value,
      recruiter:  document.getElementById('fRecruiter').value.trim(),
      recContact: document.getElementById('fRecContact').value.trim(),
      calledOn:   document.getElementById('fCalledOn').value,
      intDate:    document.getElementById('fIntDate').value,
      source:     document.getElementById('fSource').value,
      followup:   document.getElementById('fFollowup').value.trim(),
      notes:      document.getElementById('fNotes').value.trim(),
    };

    if (editId) apps = apps.map(a => a.id === editId ? entry : a);
    else        apps.unshift(entry);

    persist(); closeModal(); render();
    showToast(editId ? 'Application updated.' : 'Application added.');
  }

  // ── CRUD ──────────────────────────────────────────────────
  function editEntry(id)   { openModal(id); }

  function deleteEntry(id) {
    if (!confirm('Delete this application?')) return;
    apps = apps.filter(a => a.id !== id);
    persist(); render();
    showToast('Deleted.');
  }

  // ── Export CSV ────────────────────────────────────────────
  function exportCSV() {
    if (!apps.length) { showToast('No data to export.'); return; }
    const headers = ['Company','Role','Status','Applied On','Contacted On','Interview Date','Recruiter','Recruiter Contact','Called On','Source','Follow-up','Notes'];
    const rows = apps.map(a => [
      a.company, a.role, a.status, a.applied, a.contactedOn, a.intDate,
      a.recruiter, a.recContact, a.calledOn, a.source, a.followup, a.notes
    ].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'job-applications.csv'; a.click();
    URL.revokeObjectURL(url);
    showToast('CSV exported!');
  }

  // ── Toast ─────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Init ──────────────────────────────────────────────────
  render();
</script>
</body>
</html>
